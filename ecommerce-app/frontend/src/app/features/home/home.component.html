<main class="home-layout" aria-label="Home page">
  <div class="ambient-glow" aria-hidden="true"></div>

  <header class="hero-section container" aria-labelledby="hero-title">
    <div class="hero-grid">
      <article class="glass-panel hero-main-card">
        <div class="badge-wrapper">
          <span class="status-badge">Premium commerce experience</span>
        </div>
        
        <h1 id="hero-title" class="display-text">
          Shop Smarter With A <span class="gradient-text">Modern Dark Experience</span>
        </h1>
      

        <form class="search-form-group" (submit)="$event.preventDefault(); onSearch()" role="search">
          <div class="input-glass-container">
            <label for="home-search" class="sr-only">Search for products</label>
            <input
              id="home-search"
              type="text"
              [(ngModel)]="searchTerm"
              name="homeSearch"
              placeholder="Search for products, tech, or furniture..."
              class="glass-input"
              autocomplete="off"
            />
            <button
              type="submit"
              class="primary-cta-btn"
              [disabled]="!searchTerm.trim()">
              <span>Search</span>
              <svg viewBox="0 0 20 20" fill="currentColor" class="icon-sm"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" /></svg>
            </button>
          </div>
        </form>
      </article>
    </div>
  </header>

  <section class="discovery-grid container">
    <nav class="sidebar-nav glass-panel" aria-label="Category navigation">
      <div class="section-title-area">
        <h2 class="h3-text">Categories</h2>
      </div>

      <div class="category-stack">
        <a *ngFor="let type of taxonomy"
           [routerLink]="['/products']"
           [queryParams]="{ typeId: type.id }"
           class="nav-item-card">
          <div class="nav-icon-box">{{ type.name?.[0] || '?' }}</div>
          <div class="nav-content">
            <span class="nav-title">{{ type.name }}</span>
          </div>
        </a>
      </div>
    </nav>

    <div class="main-feed-area glass-panel">
      <div class="feed-header">
        <h2 class="h3-text">Latest Products</h2>
        <a routerLink="/products" class="text-link-btn">View all <span>&rarr;</span></a>
      </div>

      <div class="products-flex-grid" *ngIf="isLoading">
        <div class="skeleton-shimmer-card" *ngFor="let i of [1,2,3,4,5,6]"></div>
      </div>

      <div class="products-flex-grid" *ngIf="!isLoading">
        <article class="product-entry-wrapper" *ngFor="let product of featuredProducts">
          <div class="taxonomy-chip">{{ product | productTaxonomy }}</div>
          <app-product-card [product]="product" class="enhanced-card"></app-product-card>
        </article>
      </div>

      <div class="empty-state-view" *ngIf="!isLoading && featuredProducts.length === 0">
        <div class="empty-icon">📦</div>
        <p>No products available yet.</p>
        <a routerLink="/admin/products" class="action-btn-secondary">Add Products</a>
      </div>
    </div>
  </section>

  <section class="features-section container">
    <div class="features-grid">
      <div class="feature-card glass-panel" *ngFor="let prop of [
        {i:'🚚', t:'Fast Delivery', p:'Quick shipping to your doorstep'},
        {i:'🔒', t:'Secure Payments', p:'Multiple safe options'},
        {i:'⭐', t:'Quality Items', p:'Curated selection'},
        {i:'📞', t:'24/7 Support', p:'Always here for you'}
      ]">
        <div class="feature-icon-circle">{{prop.i}}</div>
        <h3>{{prop.t}}</h3>
        <p>{{prop.p}}</p>
      </div>
    </div>
  </section>
</main>
