<div class="forget-container">
    <div class="forget-card">
        <div class="forget-header">
            <h1>Welcome Back</h1>
            <p>Please enter your email to reset your password</p>
        </div>


        <div class="alert alert-error" *ngIf="errorMsg">
            {{ errorMsg }}
        </div>
        <div class="alert alert-success" *ngIf="successMsg">
            {{ successMsg }}
        </div>

        <form [formGroup]="forgetForm" (ngSubmit)="OnSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                id="email"
                type="email"
                formControlName="email"
                placeholder="Enter your email"
                [class.error]="forgetForm.get('email')?.touched && forgetForm.get('email')?.invalid"
                />
                <span class="error-message" *ngIf="forgetForm.get('email')?.touched && forgetForm.get('email')?.errors?.['required']">Email is required</span>
                <span class="error-message" *ngIf="forgetForm.get('email')?.touched && forgetForm.get('email')?.errors?.['email']">Please enter a valid email</span>
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="isLoading">Send Reset Code</button>
            <span *ngIf="isLoading">Sending Code...</span>
        </form>

        <div class="forget-register">
            Don't have an account? <a routerLink="/register">Register here</a>
        </div>
    </div>
</div>
