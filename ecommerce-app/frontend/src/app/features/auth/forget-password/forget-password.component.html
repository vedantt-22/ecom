<div class="auth-container dark-theme">
  <div class="ambient-glow"></div>

  <main class="auth-card glass fade-in">
    <div class="card-glow-border"></div>
    
    <header class="auth-header">
      <div class="icon-sphere">
        <span class="lock-icon">🔒</span>
      </div>
      <h1>Recover Access</h1>
      <p>Enter your email and we'll send a code to reset your password.</p>
    </header>

    <form [formGroup]="forgetForm" (ngSubmit)="OnSubmit()" class="auth-form">
      
      <div class="form-group" [class.is-invalid]="forgetForm.get('email')?.touched && forgetForm.get('email')?.invalid">
        <label for="email">Registered Email</label>
        <div class="input-container">
          <input 
            id="email" 
            type="email" 
            formControlName="email" 
            placeholder="e.g. name@company.com"
            autocomplete="email"
          />
          <span class="field-icon">✉️</span>
        </div>
        
        <div class="error-message" *ngIf="forgetForm.get('email')?.touched && forgetForm.get('email')?.invalid">
          Please provide a valid email address.
        </div>
      </div>

      <div class="banner error-banner slide-down" *ngIf="errorMsg">
        <span class="banner-icon">🚫</span>
        <p>{{ errorMsg }}</p>
      </div>

      <div class="banner success-banner slide-down" *ngIf="successMsg">
        <span class="banner-icon">✅</span>
        <p>{{ successMsg }}</p>
      </div>

      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="isLoading"
        [class.btn-loading]="isLoading"
      >
        <span class="btn-text" *ngIf="!isLoading">Send Reset Code</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <footer class="auth-footer">
        <a routerLink="/login" class="back-link">
          <span class="arrow">←</span> Back to Sign In
        </a>
      </footer>
    </form>
  </main>
</div>
