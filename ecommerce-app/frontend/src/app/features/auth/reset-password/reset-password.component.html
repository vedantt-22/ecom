<div class="reset-container dark-theme">
  <div class="ambient-glow"></div>

  <main class="reset-card glass fade-in">
    <div class="card-border-glow"></div>
    
    <header class="card-header">
      <div class="icon-box">
        <span class="shield-icon">🛡️</span>
      </div>
      <h1>Set New Password</h1>
      <p class="subtitle">Resetting password for: <span class="email-highlight">{{ email }}</span></p>
    </header>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
      
      <div class="form-group" [class.error]="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <input 
            id="newPassword" 
            type="password" 
            formControlName="newPassword" 
            placeholder="At least 8 characters"
            #pwInput
          />
          <span class="field-icon">🔑</span>
        </div>
        
        <div class="strength-indicator" *ngIf="resetForm.get('newPassword')?.value">
          <p [class.valid]="!resetForm.get('newPassword')?.errors?.['minlength']">8+ Characters</p>
          <p [class.valid]="!resetForm.get('newPassword')?.errors?.['passwordStrength']">A-z and 0-9</p>
        </div>
      </div>

      <div class="form-group" [class.error]="resetForm.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <input 
            id="confirmPassword" 
            type="password" 
            formControlName="confirmPassword" 
            placeholder="Repeat new password"
          />
          <span class="field-icon">🔄</span>
        </div>
        <span class="error-hint" *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched">
          Passwords do not match
        </span>
      </div>

      <div class="alert alert-error" *ngIf="errorMsg">
        <span class="alert-icon">❌</span> {{ errorMsg }}
      </div>

      <div class="alert alert-success" *ngIf="successMsg">
        <span class="alert-icon">✅</span> {{ successMsg }}
        <button type="button" class="btn-link" (click)="router.navigate(['/login'])">Login Now</button>
      </div>

      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="isLoading || resetForm.invalid"
        [class.loading]="isLoading"
      >
        <span class="btn-text" *ngIf="!isLoading">Update Password</span>
        <div class="loader" *ngIf="isLoading"></div>
      </button>

      <footer class="reset-footer">
        <a routerLink="/login" class="cancel-link">Back to login</a>
      </footer>
    </form>
  </main>
</div>
