<!-- reset-password.component.html -->
<div class="reset-container">
  <div class="reset-card">
    <div class="auth-header">
      <h1>Set new password</h1>
      <p>Create a strong password for your account</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          placeholder="Enter new password"
          [class.error]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"/>
        <span class="error-message"
          *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['required']">Password is required.</span>
        <span class="error-message"
          *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 8 characters.
        </span>
        <span
          class="error-message"
          *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['passwordStrength']
          ">Must contain uppercase, lowercase, and a number.
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm new password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Re-enter new password"
          [class.error]="resetForm.get('confirmPassword')?.touched &&
            (resetForm.get('confirmPassword')?.errors?.['required'] ||
              resetForm.errors?.['passwordMismatch'])
          "
        />
        <span
          class="error-message"
          *ngIf="
            resetForm.get('confirmPassword')?.touched &&
            resetForm.get('confirmPassword')?.errors?.['required']
          "
        >
          Please confirm your password.
        </span>
        <span
          class="error-message"
          *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['passwordMismatch']"
        >
          Passwords do not match.
        </span>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading">Resetting...</span>
      </button>
    </form>

    <div class="reset-login">
      <a routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
