<div class="auth-container dark-theme">
  <div class="blob blob-purple"></div>
  <div class="blob blob-blue"></div>

  <main class="register-card glass">
    <header class="card-header">
      <div class="brand-logo">
        <span class="logo-inner"></span>
      </div>
      <h1>Create Account</h1>
      <p>Join our community today.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      
      <div class="form-grid">
        
        <div class="form-group" [class.error]="getFieldError('name')">
          <label for="name">Full Name</label>
          <div class="input-relative">
            <input id="name" type="text" formControlName="name" placeholder="Enter your name" autocomplete="name">
            <span class="icon">👤</span>
          </div>
          <span class="error-text">{{ getFieldError('name') }}</span>
        </div>

        <div class="form-group" [class.error]="getFieldError('email')">
          <label for="email">Email Address</label>
          <div class="input-relative">
            <input id="email" type="email" formControlName="email" placeholder="email@example.com" autocomplete="email">
            <span class="icon">✉️</span>
          </div>
          <span class="error-text">{{ getFieldError('email') }}</span>
        </div>

        <div class="form-group" [class.error]="getFieldError('password')">
          <label for="password">Password</label>
          <div class="input-relative">
            <input id="password" type="password" formControlName="password" placeholder="••••••••">
            <span class="icon">🔒</span>
          </div>
          <div class="password-hint" *ngIf="registerForm.get('password')?.dirty">
             <small [class.valid]="!registerForm.get('password')?.errors?.['passwordStrength']">
               Min 8 chars: A-Z, a-z, 0-9
             </small>
          </div>
          <span class="error-text">{{ getFieldError('password') }}</span>
        </div>

        <div class="form-group" [class.error]="getFieldError('confirmPassword')">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-relative">
            <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••">
            <span class="icon">🛡️</span>
          </div>
          <span class="error-text">{{ getFieldError('confirmPassword') }}</span>
        </div>
      </div>

      <div class="error-alert fade-in" *ngIf="errorMsg">
        <span>⚠️</span> {{ errorMsg }}
      </div>

      <footer class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="isLoading || registerForm.invalid">
          <span *ngIf="!isLoading">Register Now</span>
          <div class="spinner" *ngIf="isLoading"></div>
        </button>

        <p class="switch-link">
          Already have an account? <a routerLink="/login">Sign In</a>
        </p>
      </footer>
    </form>
  </main>
</div>
