<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Please login to your account</p>
        </div>


        <div class="alert alert-error" *ngIf="errorMsg">
            {{ errorMsg }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="OnSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                id="email"
                type="email"
                formControlName="email"
                placeholder="Enter your email"
                [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                />
                <span class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">Email is required</span>
                <span class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" placeholder="Enter your password"
                [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                />
                <span class="error-message" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">Password is required</span>
                <span class="error-message" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
            </div>
            <div class="login-forget-password">
                <a routerLink="/forget-password">Forget Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="isLoading">Login</button>
            <span *ngIf="isLoading">Logging in...</span>
        </form>

        <div class="login-register">
            Don't have an account? <a routerLink="/register">Register here</a>
        </div>
    </div>
</div>
