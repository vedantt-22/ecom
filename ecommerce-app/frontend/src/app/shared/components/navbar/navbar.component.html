<nav class="navbar-container" [class.menu-open]="menuOpen">
  <div class="navbar-blur"></div>
  
  <div class="container">
    <div class="navbar-main">
      <a routerLink="/" class="brand" (click)="closeMenu()">
        <div class="logo-hex">V</div>
        <span class="brand-text">PRODUCT MART</span>
      </a>

      <ul class="nav-links desktop-only">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/products" routerLinkActive="active">Shop</a></li>
        <li *ngIf="isAdmin"><a routerLink="/admin" routerLinkActive="active" class="admin-badge">Admin Panel</a></li>
      </ul>

      <div class="nav-actions">
        <div class="auth-wrapper desktop-only">
          <ng-container *ngIf="isGuest">
            <a routerLink="/login" class="btn-ghost">Login</a>
            <a routerLink="/register" class="btn-ghost">Register</a>
          </ng-container>

          <div *ngIf="!isGuest" class="user-profile">
            <div class="avatar">{{ userInitial }}</div>
            <div class="user-dropdown glass">
              <a routerLink="/profile" class="dropdown-item" (click)="closeMenu()">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 3a4 4 0 110 8 4 4 0 010-8z"/></svg>
                <span>My Profile</span>
              </a>
              <button (click)="logout()" class="dropdown-item logout">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg><span>Logout</span>
              </button>
            </div>
          </div>
        </div>

        <a *ngIf="!isAdmin" routerLink="/cart" class="action-btn cart-trigger" routerLinkActive="active">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>

        <button class="mobile-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
          <div class="hamburger" [class.active]="menuOpen">
            <span></span><span></span><span></span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <div class="mobile-menu" [class.show]="menuOpen">
    <div class="mobile-links">
      <a routerLink="/" routerLinkActive="active" (click)="closeMenu()">Home</a>
      <a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Shop</a>
      <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
      <a *ngIf="!isGuest" routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">My Profile</a>
      
      <div class="mobile-auth-footer">
        <ng-container *ngIf="isGuest">
          <button routerLink="/login" (click)="closeMenu()" class="btn-ghost full">Login</button>
          <button routerLink="/register" (click)="closeMenu()" class="btn-primary full">Sign Up</button>
        </ng-container>
        <button *ngIf="!isGuest" (click)="logout()" class="btn-danger full">Logout</button>
      </div>
    </div>
  </div>
</nav>
