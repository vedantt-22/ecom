<article class="product-card" [routerLink]="['/product', product.id]">
  <div class="card-media">
    <div class="badge-overlay" *ngIf="product.discountPercentage > 0">
      <span class="discount-badge">-{{ product.discountPercentage }}%</span>
    </div>

    <img
      [src]="product.imageUrl || '/images/placeholder.png'"
      [alt]="product.name"
      class="product-image"
      loading="lazy"
      (error)="product.imageUrl = '/images/placeholder.png'"
    />

    <div class="media-overlay">
      <span class="category-tag">{{ product.subCategory | productTaxonomy }}</span>
    </div>
  </div>

  <div class="card-content">
    <header class="content-header">
      <h3 class="product-title" [title]="product.name">{{ product.name }}</h3>
      <div class="rating">
        <span class="star">★</span>
        <span class="rating-value">{{ product.ratingsAverage || "4.5" }}</span>
      </div>
    </header>

    <p class="product-description">
      {{ product.description | slice: 0 : 60 }}...
    </p>

    <footer class="content-footer">
      <div class="price-stack">
        <span class="current-price">{{ product.price | currency }}</span>
        <span class="old-price" *ngIf="product.priceAfterDiscount">
          {{ product.priceAfterDiscount | currency }}
        </span>
      </div>

      <button
        class="add-to-cart-btn"
        (click)="addToCart($event)"
        [class.loading]="isAddingToCart"
        [class.success]="addedToCart"
        [disabled]="isAddingToCart"
        aria-label="Add to cart"
      >
        <span class="btn-icon" *ngIf="!isAddingToCart && !addedToCart">🛒</span>
        <span class="btn-text" *ngIf="!isAddingToCart && !addedToCart"
          >Add</span
        >

        <div class="loader" *ngIf="isAddingToCart"></div>

        <span class="success-icon" *ngIf="addedToCart">✔</span>
      </button>
    </footer>

    <div class="error-toast" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>
  </div>
</article>
